services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    volumes:
      # Mount entire local directory for live development changes
      - .:/var/www/html
      # Preserve vendor and node_modules built inside container
      - /var/www/html/vendor
      - /var/www/html/node_modules
