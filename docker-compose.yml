services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: bigbestow-app:latest
    container_name: bigbestow-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    environment:
      APP_NAME: "${APP_NAME:-BigBestow}"
      APP_ENV: "${APP_ENV:-production}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "http://localhost:${APP_PORT:-8000}"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-bigbestow_db}"
      DB_USERNAME: "${DB_USERNAME:-laravel}"
      DB_PASSWORD: "${DB_PASSWORD:-secretpassword}"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Persistent storage volumes
      - app-storage:/var/www/html/storage
      - app-cache:/var/www/html/bootstrap/cache

  db:
    image: mysql:8.0
    container_name: bigbestow-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-bigbestow_db}"
      MYSQL_USER: "${DB_USERNAME:-laravel}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secretpassword}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-rootsecretpassword}"
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_ROOT_PASSWORD:-rootsecretpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  app-storage:
  app-cache:
  dbdata:
